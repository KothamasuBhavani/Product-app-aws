version: 0.2

env:
  variables:
    AWS_REGION: eu-north-1
    AWS_ACCOUNT_ID: "828414849441"
    ECR_REPOSITORY: "product_app_repo"
    # IMPORTANT: Set this to the *container name* in your ECS task definition:
    CONTAINER_NAME: "product_app_container"

phases:
  pre_build:
    commands:
      - echo "Running Maven build..."
      - mvn -q -DskipTests clean install
      - echo "Logging in to Amazon ECR..."
      - aws --version
      - ECR_REGISTRY=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com
      - REPOSITORY_URI=${ECR_REGISTRY}/${ECR_REPOSITORY}
      - aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=build-$(echo $CODEBUILD_BUILD_ID | awk -F":" '{print $2}')
      - echo "Resolved image tag: ${IMAGE_TAG}"

  build:
    commands:
      - echo "Build started on $(date)"
      - echo "Building the Docker image..."
      - docker build -t ${REPOSITORY_URI}:latest .
      - docker tag ${REPOSITORY_URI}:latest ${REPOSITORY_URI}:${IMAGE_TAG}

  post_build:
    commands:
      - echo "Build completed on $(date)"
      - echo "Pushing the Docker images..."
      - docker push ${REPOSITORY_URI}:latest
      - docker push ${REPOSITORY_URI}:${IMAGE_TAG}
      - echo "Writing image definitions file..."
      - printf '[{"name":"%s","imageUri":"%s"}]\n' "${CONTAINER_NAME}" "${REPOSITORY_URI}:${IMAGE_TAG}" > imagedefinitions.json
      - echo "Printing imagedefinitions.json content:"
      - cat imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
