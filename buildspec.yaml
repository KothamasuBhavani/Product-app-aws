version: 0.2

env:
  variables:
    REPOSITORY_URI: 828414849441.dkr.ecr.us-east-1.amazonaws.com/product-app-repo
    CONTAINER_NAME: product-app-repo    # ← set this to the name used in your ECS task
    # (optional) IMAGE_TAG can be computed instead of exported below

phases:
  pre_build:
    commands:
      - echo "Running Maven build…"
      - mvn clean install
      - echo "Logging in to Amazon ECR…"
      - aws --version
      - aws ecr get-login-password --region eu-north-1 \
          | docker login --username AWS --password-stdin "$REPOSITORY_URI"
      - COMMIT_HASH=$(echo "$CODEBUILD_RESOLVED_SOURCE_VERSION" | cut -c 1-7)
      - IMAGE_TAG=build-$(echo "$CODEBUILD_BUILD_ID" | awk -F: '{print $2}')

  build:
    commands:
      - echo "Build started on $(date)"
      - echo "Building the Docker image…"
      - docker build -t "$REPOSITORY_URI:latest" .
      - docker tag "$REPOSITORY_URI:latest" "$REPOSITORY_URI:$IMAGE_TAG"

  post_build:
    commands:
      - echo "Build completed on $(date)"
      - echo "Pushing the Docker images…"
      - docker push "$REPOSITORY_URI:latest"
      - docker push "$REPOSITORY_URI:$IMAGE_TAG"
      - echo "Writing image definitions file…"
      - printf '[{"name":"%s","imageUri":"%s"}]\n' \
          "$CONTAINER_NAME" "$REPOSITORY_URI:$IMAGE_TAG" \
          > imagedefinitions.json
      - echo "Printing imagedefinitions.json content:"
      - cat imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
